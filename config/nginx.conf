worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 16m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream dashboard {
        server 127.0.0.1:5000;
    }

    upstream ttyd {
        server 127.0.0.1:7681;
    }

    upstream spiderfoot {
        server 127.0.0.1:5001;
    }

    upstream social_analyzer {
        server 127.0.0.1:9005;
    }

    upstream seekr {
        server seekr:8569;
    }

    upstream webcheck {
        server webcheck:3000;
    }

    upstream filebrowser {
        server filebrowser:8081;
    }

    server {
        listen 8080;
        server_name _;

        location /health {
            proxy_pass http://dashboard/health;
        }

        # Raccourcis URL courantes
        # Seekr links to absolute /web/... paths; map them to /seekr/web/...
        location /web/ {
            return 302 /seekr$request_uri;
        }

        location = /check {
            return 302 /webcheck/;
        }

        location /terminal/ {
            proxy_pass http://ttyd/terminal/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /spiderfoot/ {
            proxy_pass http://spiderfoot/spiderfoot/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SpiderFoot emits absolute redirects using the bare host (no port);
            # rewrite any absolute Location back to a relative path so the
            # browser keeps its current origin (host:8080).
            proxy_redirect ~*^https?://[^/]+(/.*)$ $1;
        }

        location = /social-analyzer/ {
            return 302 /social-analyzer/app.html;
        }

        location /social-analyzer/ {
            rewrite ^/social-analyzer/?(.*)$ /$1 break;
            proxy_pass http://social_analyzer;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # API Social Analyzer (chemins absolus dans app.html)
        location ~ ^/(app\.html|graph\.html|cancel|get_logs|get_settings|save_settings|analyze_string|generate)$ {
            proxy_pass http://social_analyzer;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /seekr/ {
            rewrite ^/seekr/?(.*)$ /$1 break;
            proxy_pass http://seekr;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /webcheck/ {
            proxy_pass http://webcheck/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /files/ {
            proxy_pass http://filebrowser/files/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
    }
}
